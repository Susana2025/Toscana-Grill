<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración Toscana Grill</title>
  <link rel="stylesheet" href="../css/configuracion.css?v=2">
</head>
<body>
  <main class="config-card">
    <h1>Configuración del menú</h1>
    <p>Puedes probar los cambios en este navegador o descargar <strong>config.json</strong> para publicarlos para todos los clientes.</p>
    <section>
      <h2>Datos generales</h2>
      <label>WhatsApp<input id="whatsappNumber" type="text" maxlength="15"></label>
      <div class="grid-3">
        <label>Desechables<input id="disposableFeePerItem" type="number" min="0" step="0.05"></label>
        <label>Delivery<input id="deliveryFee" type="number" min="0" step="0.25"></label>
        <label>Máximo por producto<input id="maxQuantityPerItem" type="number" min="1" max="99"></label>
      </div>
    </section>
    <section>
      <h2>Horario semanal</h2>
      <div id="days" class="days"></div>
    </section>
    <div class="actions">
      <button id="saveLocalConfig" type="button">Guardar en este navegador</button>
      <button id="downloadConfig" type="button">Descargar config.json</button>
      <button id="clearLocalConfig" class="secondary" type="button">Restablecer configuración local</button>
    </div>
    <p id="status" class="status"></p>
  </main>
  <script src="../js/config-editor.js?v=4"></script>
</body>
</html>
