<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="robots"
    content="noindex, nofollow"
  >

  <title>Acceso del personal | Toscana Grill</title>

  <link
    rel="stylesheet"
    href="../css/login.css"
  >
</head>

<body>
  <main class="login-page">
    <section
      class="login-card"
      aria-labelledby="login-title"
    >
      <div class="login-brand">
        <p class="login-eyebrow">Toscana Grill</p>

        <h1 id="login-title">
          Acceso del personal
        </h1>

        <p class="login-description">
          Ingresa con la cuenta asignada por el administrador.
        </p>
      </div>

      <form
        id="login-form"
        class="login-form"
        novalidate
      >
        <div class="form-group">
          <label for="email">
            Correo electrónico
          </label>

          <input
            id="email"
            name="email"
            type="email"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">
            Contraseña
          </label>

          <div class="password-wrapper">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              minlength="6"
            >

            <button
              id="toggle-password"
              class="password-toggle"
              type="button"
              aria-label="Mostrar contraseña"
            >
              Mostrar
            </button>
          </div>
        </div>

        <p
          id="login-message"
          class="login-message"
          role="alert"
          aria-live="polite"
          hidden
        ></p>

        <button
          id="login-submit"
          class="login-submit"
          type="submit"
        >
          Iniciar sesión
        </button>
      </form>

      <a
        class="return-link"
        href="../index.html"
      >
        Volver al menú
      </a>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
